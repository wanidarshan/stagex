<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, dinitial-scale=1.0">
    <title>login</title>
        
        <style>
             legend{
                font-family:'Courier New', Courier, monospace;
                font-weight:700;
                font-size:xx-large;
                margin: 10%;
            } 
            body{
    background:linear-gradient(135deg, #5b77f3, #9062be,rgb(228, 231, 55)) ;
    font-family:Arial, Helvetica, sans-serif;
    display: flex;
    justify-content:center;
    align-items: center;
    height: 100vh;
}
.container {
    background:rgba(255, 0, 0, 0.219) ;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
}
input{
    width: 90%;
    padding: 10px;
    margin: 10px 0;
}
button{
    width: 100%;
    padding: 10px;
    background: rgb(55, 92, 255); 
    border: none;
    border-radius: 5px;
}
.box{
    box-shadow: 5px 15px 40px #e6ff04;
}

        </style>
</head>

<body>
                      
    <div class="container box">
        <legend>Signup</legend>
        <div>
            <input type="text" placeholder="Full name">
        </div>
        <div>
            <input type="email" placeholder="enter email Id">
        </div>
        <div>
            <input type="password" placeholder="password">
        </div>
        <div>
            <input type="password" placeholder="confirm password">
        </div>
        <button class="text:gold">Signup</button>
        <p>Already have an account? <a href="login.html">login</a></p>
    </div>
</body>
</html>
